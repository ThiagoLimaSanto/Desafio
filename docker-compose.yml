services:
  app:
    build: 
      context: ./backend
      dockerfile: 
    container_name: backend
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - 
    depends_on:
      - mongodb
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3333
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - app

  mongodb:
    image: mongo:8
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - desafio:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
volumes:
  desafio: